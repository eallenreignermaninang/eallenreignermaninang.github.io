# .github/workflows/playwright.yml
#
# 🤖 GITHUB ACTIONS — CI/CD PIPELINE FOR PLAYWRIGHT TESTS
#
# What this does:
#   Every time you push code or open a pull request,
#   GitHub will automatically run all your Playwright tests.
#   If tests fail, the push is flagged — catching bugs before they go live.
#
# This is exactly how professional teams work. Having this in your portfolio
# shows you understand real-world software development workflows.

name: Playwright Tests

on:
  # ▶️ Run tests on every push to the main branch
  push:
    branches: [main]

  # ▶️ Also run tests on every pull request targeting main
  pull_request:
    branches: [main]

  # ▶️ Allow you to manually trigger tests from GitHub Actions tab
  workflow_dispatch:

jobs:
  test:
    # 🖥️ Run on the latest Ubuntu virtual machine (free on GitHub)
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out your code so the runner can access it
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Set up Node.js (Playwright runs on Node)
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Step 3: Install your project's dependencies (from package.json)
      - name: Install dependencies
        run: npm install

      # Step 4: Install Playwright browsers (Chromium, Firefox, WebKit)
      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      # Step 5: Run all the tests!
      - name: Run Playwright tests
        run: npx playwright test

      # Step 6: Upload the HTML test report as an artifact
      # Even if tests fail, you can download and view the full report
      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always() # Run this step even if tests fail
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
